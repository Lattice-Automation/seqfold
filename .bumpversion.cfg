[bumpversion]
current_version = 0.10.0
commit = True
tag = True

# Version is single-sourced from Cargo.toml; pyproject.toml derives it via
# `dynamic = ["version"]`, so only Cargo.toml needs updating on a bump.
[bumpversion:file:Cargo.toml]
search = version = "{current_version}"
replace = version = "{new_version}"
